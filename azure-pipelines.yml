trigger: none

pool: Himalay

stages:
  - stage: CI
    jobs:
      - job: 
        steps:
          - task: NodeTaskRunnerInstaller@0
            inputs:
              nodeVersion: '16'
          - task: Bash@3
            inputs:
              targetType: 'inline'
              script: 'npm install'
          - task: Bash@3
            inputs:
              targetType: 'inline'
              script: 'npm run build'
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/build'
              artifact: 'drop'
              publishLocation: 'pipeline'
  - stage: CD
    jobs:
      - job: 
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              buildType: 'current'
              artifactName: 'drop'
              targetPath: '$(System.DefaultWorkingDirectory)/build'
          
  
