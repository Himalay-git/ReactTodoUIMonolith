trigger: none

pool: Himalay

stages:
  - stage: CI
    jobs:
      - job: 
        steps:
          - task: NodeTaskRunnerInstaller@0
            inputs:
              nodeVersion: '16'
          - task: Bash@3
            inputs:
              targetType: 'inline'
              script: 'npm install'
          - task: Bash@3
            inputs:
              targetType: 'inline'
              script: 'npm run build'

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/build'
              publishLocation: 'pipeline'

